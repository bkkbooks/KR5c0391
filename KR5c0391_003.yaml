body:
  text: 莊子雜篇讓王二十八昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉至於岐陽則文王已歿矣武王聞之使叔旦往見之與盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其於人也忠信盡治而求焉樂與正為正樂與治為治不以人之壞自成也不以人之卑自高也不以遭時自利也今周見殷之亂而遽為政與治上謀而行貨阻兵而保威割牲而盟以為信揚行以悅衆殺伐以要利是推亂以易暴也吾聞古之士遭治世不避其任遇亂世不為苟存今天下暗周德衰其並乎周以塗吾身也不如避之以潔吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也苟可得已則必不賴高節戾行獨樂其志不事於世此二士之節也
